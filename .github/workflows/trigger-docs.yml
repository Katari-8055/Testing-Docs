name: Trigger Docs Build on Code Push

on:
  push:
    branches:
      - main

jobs:
  notify-docs-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Send signal to Docs Repository
        run: |
          HTTP_RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.github.com/repos/Katari-8055/Automatic-Docs-Generater-PipeLine/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.DOCS_PAT_TOKEN }}" \
            -d '{"event_type": "update-docs-event"}')
          
          echo "HTTP Status Code: $HTTP_RESPONSE"
          echo "Response Body:"
          cat response.txt
          
          if [ "$HTTP_RESPONSE" != "204" ]; then
            echo "ERROR: Expected 204 but got $HTTP_RESPONSE"
            exit 1
          fi
          
          echo "Signal sent successfully!"
